<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Clifbook</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: #ffffff;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      text-align: center;
    }

    .container {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    h1 {
      font-size: 3rem;
      font-weight: 700;
      margin-bottom: 10px;
      letter-spacing: 1px;
    }

    p {
      font-size: 1.2rem;
      color: #cfd8dc;
      margin-bottom: 40px;
    }

    .btn {
      background: linear-gradient(135deg, #00c853, #00e676);
      color: #fff;
      padding: 18px 35px;
      border-radius: 50px;
      text-decoration: none;
      font-size: 1.2rem;
      font-weight: bold;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
      transition: all 0.3s ease;
    }

    .btn:hover {
      transform: translateY(-3px) scale(1.05);
      box-shadow: 0 15px 30px rgba(0, 0, 0, 0.4);
    }

    footer {
      padding: 20px;
      font-size: 0.9rem;
      color: #b0bec5;
    }

    @media (max-width: 600px) {
      h1 {
        font-size: 2.2rem;
      }

      p {
        font-size: 1rem;
      }

      .btn {
        font-size: 1rem;
        padding: 15px 25px;
      }
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>Clifbook</h1>
    <p>Official Developer Website</p>

    <a 
      href="https://play.google.com/store/apps/details?id=clifbook.appmkp" 
      class="btn" 
      target="_blank"
    >
      Get it now on Google Play Store
    </a>
  </div>

  <footer>
    © 2026 Clifbook
  </footer>

</body>
</html>
